name: Build and Release APK

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '11'
        cache: gradle

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.10.0'
        channel: 'stable'
        cache: true

    - name: Get Flutter packages
      run: flutter pub get

    - name: Clean build
      run: flutter clean

    - name: Build APK - Universal
      run: flutter build apk --release

    - name: Build APK - Split per ABI
      run: flutter build apk --split-per-abi --release

    - name: Prepare release files
      run: |
        mkdir -p release_files
        
        # Copy universal APK
        cp build/app/outputs/flutter-apk/app-release.apk release_files/OmniCapture-Universal.apk
        
        # Copy split APKs if they exist
        if [ -f build/app/outputs/apk/release/app-armeabi-v7a-release.apk ]; then
          cp build/app/outputs/apk/release/app-armeabi-v7a-release.apk release_files/OmniCapture-32bit.apk
        fi
        
        if [ -f build/app/outputs/apk/release/app-arm64-v8a-release.apk ]; then
          cp build/app/outputs/apk/release/app-arm64-v8a-release.apk release_files/OmniCapture-64bit.apk
        fi
        
        # Generate checksums
        cd release_files
        sha256sum * > SHA256CHECKSUMS.txt
        cd ..
        
        echo "📦 Release files ready:"
        ls -lh release_files/

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: release_files/*
        draft: false
        prerelease: false
        generate_release_notes: true
        body: |
          # 🎉 OmniCapture Release
          
          ## 📱 Download APK Files
          
          ### Universal APK (Recommended)
          - **OmniCapture-Universal.apk** - Works on all devices (32-bit & 64-bit)
          - Size: ~50-60 MB
          - Android: 5.0+ (API 21+)
          
          ### Split APKs
          - **OmniCapture-32bit.apk** - For 32-bit devices
          - **OmniCapture-64bit.apk** - For 64-bit devices
          
          ## ✨ Features
          - Screenshot Capture
          - Screen Recording
          - Clean Minimalism Design
          - Custom Save Location
          - Light & Dark Theme
          - 32-bit & 64-bit Support
          
          ## 🔐 Verify Integrity
          ```bash
          sha256sum -c SHA256CHECKSUMS.txt
          ```
          
          ## 📥 Installation
          1. Download APK file
          2. Enable "Unknown Sources" in Settings
          3. Tap APK to install
          4. Grant required permissions
          
          ## 🐛 Bug Reports
          Found an issue? Create an issue on GitHub.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload to artifacts
      uses: actions/upload-artifact@v3
      with:
        name: OmniCapture-Release-${{ github.ref_name }}
        path: release_files/
        retention-days: 180

    - name: Notify completion
      run: |
        echo "✅ Release published successfully!"
        echo "📦 Download from: https://github.com/Shishirhossain20/OmniCapture/releases/tag/${{ github.ref_name }}"
        echo "📱 APK files available for download"
